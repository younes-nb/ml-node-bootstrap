---
- name: Update apt cache and install base packages
  become: true
  apt:
    update_cache: yes
    name: "{{ system_packages }}"
    state: present

- name: Add NVIDIA graphics drivers PPA
  become: true
  ansible.builtin.apt_repository:
    repo: ppa:graphics-drivers/ppa
    state: present
    update_cache: yes

- name: Auto-install newest recommended NVIDIA driver
  become: true
  command: ubuntu-drivers autoinstall
  register: driver_install
  changed_when: 
    - "'already installed' not in driver_install.stdout"
    - "'No drivers found' not in driver_install.stdout"

- name: Ensure /dataset is owned by the current user and their primary group
  become: true
  file:
    path: /dataset
    owner: "{{ ansible_user_id }}"
    group: "{{ ansible_user_gid }}"
    recurse: yes
    state: directory